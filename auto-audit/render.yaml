services:
  # 🖥️ API REST (Express + PostgreSQL)
  - type: web
    name: auto-audit-api
    env: node
    region: oregon
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false    # Lo configuras manual en Render Dashboard
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        value: https://auto-audit.onrender.com
      - key: NODE_VERSION
        value: 20

  # 🎨 Frontend (React + Vite)
  - type: static
    name: auto-audit
    region: oregon
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    envVars:
      - key: VITE_API_URL
        value: https://auto-audit-api.onrender.com
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
